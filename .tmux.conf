# ── Modern defaults ───────────────────────────────────────────────
set -g mouse on                          # mouse: select panes, resize, scroll
set -g history-limit 50000               # bigger scrollback
set -sg escape-time 0                    # no delay for ESC (matters for nvim)
set -g base-index 1                      # windows start at 1
setw -g pane-base-index 1                # panes start at 1
set -g renumber-windows on               # keep window numbers gapless
set -g focus-events on                   # let nvim know when tmux pane is focused

# True color + undercurl passthrough for nvim themes
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── vim-tmux-navigator: Ctrl-h/j/k/l across nvim splits & tmux panes ─
# Detect whether the active pane is running (n)vim; if so, pass the key through.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ── Quality-of-life keys ──────────────────────────────────────────
# Split panes with | and - , keeping the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
